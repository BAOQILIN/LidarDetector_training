# 层级：
# 0-隐藏，只存在于配置文件中，但再web页面对内对外都不可见
# 1-对内，内部开发人员可以再web页面看到，0和1互补，包含所有参数
# 2-对外，外部用户可见，是1的子集
# 设置成高于自身权限的参数会无法在云端修改，比如自身权限是2的用户无法看到0和1的参数

# =============================================================================
# preprocess
# =============================================================================
PREPROCESS:
  ORI_DATA_PATH: ['用户自定义', 1, '原始数据集加载路径(文件夹名),具体使用参见data_preprocessor.py中DataPreprocessor的构造函数注释']
  SAVE_DATA_PATH: ['用户自定义', 1, '预处理后的文件保存路径(文件夹名),同时也是构建Dataset类(data_dataset.py)的文件输入路径,具体使用参见data_preprocessor.py和data_dataset.py中的注释']

# =============================================================================
# train_model
# =============================================================================
TRAIN_MODEL:
  TRAIN:
    OVERALL:
      TYPE: ['用户自定义', 0, '模型类别名称']
      # KEY: ['用户自定义', 1, '模型损失文件losses.npy中losses的key值&测评文件eva_test.npy中的测评结果的key值,就是字典的key']
      TRAIN_PREFIX: ['用户自定义', 0, '模型处于生成训练集阶段的标志参数,参见data_dataset.py中 类dataset的构造函数代码注释']
      INITIAL_RESULT: [True, 2, '是否初始化保存的结果,True则会清空本地已保存的损失和测评结果']
    PATH:
      DATASET_PATH: ['同[PREPROCESS][SAVE_DATA_PATH][0]', 1, 'data_dataset.py中输入数据的路径']
      RESULT_PATH: ['用户自定义', 1, '保存 模型损失&测评结果的路径(文件夹名)']
      SAVE_MODEL_PREFIX: ['用户自定义 XXX', 2, '保存模型的前缀，保存的命名规则为: XXX.torch']
      CONTINUE_MODEL_PREFIX: ['用户自定义 XXX', 2, '续跑模型的前缀,一般地与SAVE_MODEL_PREFIX一致']
    MODEL:
      FREEZE:
        LAYER: [False, 1, '是否冻结指定模块标志参数,用户无需改动']
    CTRL:
      CTRL_:
        EPOCH_NUM: [10, 2, '总训练轮次']
        CONTINUE_EPOCH: [-1, 2, '续跑模型的轮次']
        OPTIMIZER_LR: [0.001, 2, '初始学习率']
        SCHEDULER_TYPE: ['', 2, '学习率变化模型,现支持:None(不填):常规模型,torch.optim.lr_scheduler.StepLR;warmup:学习率从0上升,随后cos变化下降,见get_cosine_schedule_with_warmup']
        SCHEDULER_STEP: [1, 2, 'torch.optim.lr_scheduler.StepLR的step_size参数']
        SCHEDULER_GAMMA: [0.9, 2, 'torch.optim.lr_scheduler.StepLR的gamma参数']
        SCHEDULER_WARMUP_STEPS: [25, 2, 'warmup模式下生效,学习率以线性变化在scheduler_warmup_steps时达到optimizer_lr, 1step代表 1epoch']
      DATA:
        BATCH_SIZE: [用户自定义, 2, '单个batch中的样本数量']
      LOSS:
        PRINT_GAP: [用户自定义, 2, '输出间隔,每经过多少个batch打印一次损失值']

  VALIDATION:
    VALI_:
      PREFIX: ['validation', 0, '模型处于生成验证集阶段的标志参数,参见data_dataset.py中 类dataset的构造函数代码注释']

  TEST:
    TEST_:
      PREFIX: [['test'], 0, '模型处于生成测试集阶段的标志参数,参见data_dataset.py中 类dataset的构造函数代码注释']

  EVALUATION:
    START_EPOCH: [0, 2, '评估过程起始epoch']
    END_EPOCH: [1, 2, '评估过程结束epoch'] 

  SAVE:
    SAVE_EPOCH: [1, 2, '保存指定epoch的onnx模型']
    # SAVE_PATH: ['model_onnx_bin', 2, 'onnx模型或bin模型保存路径(文件夹名)']
    
# =============================================================================
# display
# =============================================================================
DISPLAY:
  RESULT_PATH: ['同[TRAIN_MODEL][TRAIN][PATH][RESULT_PATH]', 2, '读取 模型损失文件losses.npy和测评文件eva_test.npy的路径(文件夹名)']
