# HX dataset dedicated config for Linux runs
# Base structure follows algo_config.yaml, but points to the HX flat dataset

PREPROCESS:
  DATASET_STYLE: ['hx_flat', 1, '数据集风格: HX 扁平目录']
  ORI_DATA_PATH: ['origin_type', 1, 'HX 扁平原始数据目录']
  ORI_LABEL_PATH: ['Label', 1, 'HX 模式下不使用单独标签目录']
  SAVE_DATA_PATH: ['hx_preprocess', 1, '预处理输出目录']
  COUNT_LIDAR_POINTS: [False, 1, '是否统计每个gt框内点数，HX模式下默认关闭以加速预处理']
  USE_MULTIPROCESS: [True, 1, '是否启用多进程预处理']
  NUM_WORKERS: [24, 1, 'HX预处理进程数']
  CLASS_MAPPING:
    Pedestrian: ['Pedestrian', 1, 'HX原始类别到训练类别的映射']
    Bicycle: ['Mbike', 1, 'HX原始类别到训练类别的映射']
    Car: ['Car', 1, 'HX原始类别到训练类别的映射']
    Heavy Truck: ['Bus', 1, 'HX原始类别到训练类别的映射']
    Bus: ['Bus', 1, 'HX原始类别到训练类别的映射']
  ROI:
    X_MIN: [ -102.4, 2, 'x_min']
    Y_MIN: [ -51.2, 2, 'y_min']
    Z_MIN: [ -51.2, 2, 'z_min']
    X_MAX: [ 102.4, 2, 'x_max']
    Y_MAX: [ 51.2, 2, 'y_max']
    Z_MAX: [ 51.2, 2, 'z_max']
  RATIO: [0.82, 2, '训练集在整个数据集中的占比']

TRAIN_MODEL:
  TRAIN:
    OVERALL:
      TYPE: ['PointPillars', 0, '模型类别名称']
      TRAIN_PREFIX: ['training', 0, '模型处于生成训练集阶段的标志参数']
      INITIAL_RESULT: [True, 2, '是否初始化保存的结果']
    PATH:
      DATASET_PATH: ['hx_preprocess', 1, '输入预处理数据的路径']
      RESULT_PATH: ['loss_eva', 1, '保存模型损失和测评结果的路径']
      SAVE_MODEL_PREFIX: ['PointPillars', 2, '保存模型的前缀']
      CONTINUE_MODEL_PREFIX: ['PointPillars', 2, '续跑模型的前缀']
    MODEL:
      FREEZE:
        LAYER: [False, 1, '是否冻结指定模块标志参数']
    CTRL:
      CTRL_:
        EPOCH_NUM: [50, 2, '总训练轮次']
        CONTINUE_EPOCH: [-1, 2, '续跑模型的轮次']
        OPTIMIZER_LR: [0.001, 2, '初始学习率']
        SCHEDULER_TYPE: ['OneCycleLR', 2, '学习率变化模型']
        SCHEDULER_STEP: [1, 2, 'StepLR step_size']
        SCHEDULER_GAMMA: [0.9, 2, 'StepLR gamma']
        SCHEDULER_WARMUP_STEPS: [25, 2, 'warmup step数']
        EVAL_EVERY_EPOCHS: [5, 2, '每隔多少个epoch做一次验证']
        USE_MULTI_GPU: [False, 1, '是否启用多GPU训练(DataParallel)']
      DATA:
        BATCH_SIZE: [4, 2, '单个batch中的样本数量']
        RESAMPLING: [True, 2, '是否进行重采样']
        NUM_WORKERS: [4, 1, '训练数据加载进程数']
        PIN_MEMORY: [True, 1, '是否启用 pin_memory']
        PERSISTENT_WORKERS: [True, 1, '是否复用 worker']
        PREFETCH_FACTOR: [4, 1, 'DataLoader 预取因子']
        ROI:
          X_MIN: [-102.4, 2, '']
          Y_MIN: [-51.2, 2, '']
          Z_MIN: [-3.1, 2, '']
          X_MAX: [102.4, 2, '']
          Y_MAX: [51.2, 2, '']
          Z_MAX: [4.9, 2, '']
        VOXEL_SIZE:
          X: [0.2, 2, '']
          Y: [0.2, 2, '']
          Z: [8.0, 2, '']
        MAX_POINTS_PER_VOXEL: [20, 2, '']
        MAX_VOXEL_NUM: [60000, 2, '']
      AUGMENT:
        EXTRACT_MINOR_TYPE: [False, 2, '是否进行少数类别增强']
        APPEND_TYPES: ['None', 2, '需要进行数据增强的具体类别']
        APPEND_NUM: ['None', 2, '每种类别需要添加的点云簇数目']
        APPEND_PROBS: ['None', 2, '每种类别进行数据增强的概率']
        FILTER_MIN_POINTS: [False, 2, '是否针对不同类别利用点数进行目标筛选']
        MIN_POINTS_NUM:
          PEDESTRIAN: [35, 2, '']
          MBIKE: [40, 2, '']
          CAR: [50, 2, '']
          BUS: [60, 2, '']
          TRICYCLE: [40, 2, '']
        RANDOM_FLIP: [True, 2, '随机沿X/Y方向翻转']
        RANDOM_ROTATION:
          MIN: [-0.3925, 2, '旋转角度下限']
          MAX: [0.3925, 2, '旋转角度上限']
        RANDOM_SCALINGS:
          MIN: [0.95, 2, '']
          MAX: [1.05, 2, '']
      LOSS:
        PRINT_GAP: [100, 2, '输出间隔']
        CLS_WEIGHT: [1.0, 2, '类别损失权重']
        LOC_WEIGHT: [0.25, 2, '定位损失权重']
        POS_CLS_WEIGHT: [1.0, 2, '正例类别损失']
        NEG_CLS_WEIGHT: [2.0, 2, '负例类别损失']
  VALIDATION:
    VALI_:
      PREFIX: ['validation', 0, '验证集标志参数']

  TEST:
    TEST_:
      PREFIX: ['test', 0, '测试集标志参数']
  PREDICT:
    PREDICT_:
      PREFIX: ['predict', 0, '预测集标志参数']

  EVALUATION:
    START_EPOCH: [0, 2, '评估起始epoch']
    END_EPOCH: [1, 2, '评估结束epoch']

  SAVE:
    SAVE_EPOCH: [1, 2, '保存指定epoch的onnx模型']
    SAVE_PATH: ['model_onnx', 2, 'onnx模型或bin模型保存路径']

  ANCHORS:
    ANCHOR_GENERATOR_CONFIG_PEDESTRIAN:
      class_name: [ 'Pedestrian', 1, '类别名' ]
      anchor_sizes:
        X: [0.73, 2, '' ]
        Y: [0.67, 2, '' ]
        Z: [1.67, 2, '' ]
      anchor_bottom_heights: [-1.085, 2, 'Pedestrian锚框底边高度' ]
      align_center: [False, 1, 'align_center' ]
      feature_map_stride: [ 4, 1, 'feature_map_stride' ]
      matched_threshold: [ 0.5, 1, 'Pedestrian匹配阈值']
      unmatched_threshold: [ 0.3, 1, 'Pedestrian未匹配阈值']
    ANCHOR_GENERATOR_CONFIG_MBIKE:
      class_name: [ 'Mbike', 1, '类别名' ]
      anchor_sizes:
        X: [1.80, 2, '' ]
        Y: [0.77, 2, '' ]
        Z: [1.47, 2, '' ]
      anchor_bottom_heights: [-1.085, 2, 'Mbike锚框底边高度' ]
      align_center: [ False, 1, 'align_center' ]
      feature_map_stride: [ 4, 1, 'feature_map_stride' ]
      matched_threshold: [ 0.5, 1, 'Mbike匹配阈值' ]
      unmatched_threshold: [ 0.3, 1, 'Mbike未匹配阈值' ]
    ANCHOR_GENERATOR_CONFIG_CAR:
      class_name: [ 'Car', 1, '类别名']
      anchor_sizes:
        X: [4.63, 2, '']
        Y: [1.97, 2, '']
        Z: [1.74, 2, '']
      anchor_bottom_heights: [-0.95, 2, 'Car锚框底边高度' ]
      align_center: [ False, 1, 'align_center' ]
      feature_map_stride: [ 4, 1, 'feature_map_stride' ]
