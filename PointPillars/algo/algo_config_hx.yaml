      unmatched_threshold: [ 0.45, 1, 'Car未匹配阈值' ]
    ANCHOR_GENERATOR_CONFIG_BUS:
      class_name: [ Bus, 1, '类别名' ]
      anchor_sizes:
        X: [10.5, 2, '' ]
        Y: [2.94, 2, '' ]
        Z: [3.47, 2, '' ]
      anchor_bottom_heights: [-0.085, 2, 'Bus锚框底边高度' ]
      align_center: [ False, 1, 'align_center' ]
      feature_map_stride: [ 4, 1, 'feature_map_stride' ]
      matched_threshold: [ 0.55, 1, 'Bus匹配阈值' ]
      unmatched_threshold: [ 0.4, 1, 'Bus未匹配阈值' ]
    ANCHOR_GENERATOR_CONFIG_TRICYCLE:
      class_name: [ 'Tricycle', 1, '类别名' ]
      anchor_sizes:
        X: [2.30, 2, '' ]
        Y: [1.63, 2, '' ]
        Z: [1.83, 2, '' ]
      anchor_bottom_heights: [-1.033, 2, 'Tricycle锚框底边高度' ]
      align_center: [ False, 1, 'align_center' ]
      feature_map_stride: [ 4, 1, 'feature_map_stride' ]
      matched_threshold: [ 0.55, 1, 'Tricycle匹配阈值' ]
      unmatched_threshold: [ 0.4, 1, 'Tricycle未匹配阈值' ]
  POSTPROCESS:
    NMS:
      MULTI_CLASSES_NMS: [True, 2, '']
      NMS_TYPE: ['nms_gpu', 2, '']
      NMS_THRESH: [0.2, 2, '']
      NMS_PRE_MAXSIZE: [4000, 2, '']
      NMS_POST_MAXSIZE: [166, 2, '']
    SCORE_THRESH: [0.2, 2, '']

DISPLAY:
  RESULT_PATH: ['loss_eva', 2, '读取模型损失和测评结果的路径']
