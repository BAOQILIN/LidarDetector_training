# 层级：
# 0-隐藏，只存在于配置文件中，但再web页面对内对外都不可见
# 1-对内，内部开发人员可以再web页面看到，0和1互补，包含所有参数
# 2-对外，外部用户可见，是1的子集
# 设置成高于自身权限的参数会无法在云端修改，比如自身权限是2的用户无法看到0和1的参数

# =============================================================================
# preprocess
# =============================================================================
PREPROCESS:
  DATASET_STYLE: ['old_platform', 1, '数据集风格: old_platform(旧Lidar/Label结构) 或 hx_flat(HX扁平目录)']
  ORI_DATA_PATH: ['Lidar', 1, '原始数据集加载路径(文件夹名), old_platform 模式下为点云目录, hx_flat 模式下为扁平根目录']
  ORI_LABEL_PATH: ['Label', 1, '原始数据集真值标签的加载路径(文件夹名), hx_flat 模式下不使用单独标签目录']
  SAVE_DATA_PATH: ['data_preprocess', 1, '预处理后的文件保存路径(文件夹名),同时也是构建Dataset类(data_dataset.py)的文件输入路径,具体使用参见data_preprocessor.py和data_dataset.py中的注释']
  COUNT_LIDAR_POINTS: [True, 1, '是否统计每个gt框内点数，关闭后将写入占位值以提速预处理']
  CLASS_MAPPING:
    Pedestrian: ['Pedestrian', 1, 'HX原始类别到训练类别的映射']
    Bicycle: ['Mbike', 1, 'HX原始类别到训练类别的映射']
    Car: ['Car', 1, 'HX原始类别到训练类别的映射']
    Heavy Truck: ['Bus', 1, 'HX原始类别到训练类别的映射']
    Bus: ['Bus', 1, 'HX原始类别到训练类别的映射']
  ROI:
    X_MIN: [ -102.4, 2, 'x_min']
    Y_MIN: [ -51.2, 2, 'y_min']
    Z_MIN: [ -51.2, 2, 'z_min']
    X_MAX: [ 102.4, 2, 'x_max']
    Y_MAX: [ 51.2, 2, 'y_max']
    Z_MAX: [ 51.2, 2, 'z_max']
  RATIO: [0.82, 2, '训练集在整个数据集中的占比']

# =============================================================================
# train_model
# =============================================================================
TRAIN_MODEL:
  TRAIN:
    OVERALL:
      TYPE: ['PointPillars', 0, '模型类别名称']
      # KEY: ['用户自定义', 1, '模型损失文件losses.npy中losses的key值&测评文件eva_test.npy中的测评结果的key值,就是字典的key']
      TRAIN_PREFIX: ['training', 0, '模型处于生成训练集阶段的标志参数,参见data_dataset.py中 类dataset的构造函数代码注释']
      INITIAL_RESULT: [True, 2, '是否初始化保存的结果,True则会清空本地已保存的损失和测评结果']
    PATH:
      DATASET_PATH: ['data_preprocess', 1, 'data_dataset.py中输入数据的路径']
      RESULT_PATH: ['loss_eva', 1, '保存 模型损失&测评结果的路径(文件夹名)']
      SAVE_MODEL_PREFIX: ['PointPillars', 2, '保存模型的前缀，保存的命名规则为: XXX.torch']
      CONTINUE_MODEL_PREFIX: ['PointPillars', 2, '续跑模型的前缀,一般地与SAVE_MODEL_PREFIX一致']
    MODEL:
      FREEZE:
        LAYER: [False, 1, '是否冻结指定模块标志参数,用户无需改动']
    CTRL:
      CTRL_:
        EPOCH_NUM: [3, 2, '总训练轮次']
        CONTINUE_EPOCH: [-1, 2, '续跑模型的轮次']
        OPTIMIZER_LR: [0.001, 2, '初始学习率']
        SCHEDULER_TYPE: ['OneCycleLR', 2, '学习率变化模型,现支持:None(不填):常规模型,torch.optim.lr_scheduler.StepLR;warmup:学习率从0上升,随后cos变化下降,见get_cosine_schedule_with_warmup']
        SCHEDULER_STEP: [1, 2, 'torch.optim.lr_scheduler.StepLR的step_size参数']
        SCHEDULER_GAMMA: [0.9, 2, 'torch.optim.lr_scheduler.StepLR的gamma参数']
        SCHEDULER_WARMUP_STEPS: [25, 2, 'warmup模式下生效,学习率以线性变化在scheduler_warmup_steps时达到optimizer_lr, 1step代表 1epoch']
        EVAL_EVERY_EPOCHS: [1, 2, '每隔多少个epoch做一次验证']
        USE_MULTI_GPU: [False, 1, '是否启用多GPU训练(DataParallel)']
      DATA:
        BATCH_SIZE: [1, 2, '单个batch中的样本数量']
        RESAMPLING: [True, 2, '是否进行重采样']
        NUM_WORKERS: [0, 1, '训练数据加载进程数']
        PIN_MEMORY: [False, 1, '是否启用 pin_memory']
        PERSISTENT_WORKERS: [False, 1, '是否复用 worker']
        PREFETCH_FACTOR: [2, 1, 'DataLoader 预取因子']
        ROI:
          X_MIN: [-102.4, 2, '']
          Y_MIN: [-51.2, 2, '']
          Z_MIN: [-3.1, 2, '']
          X_MAX: [102.4, 2, '']
          Y_MAX: [51.2, 2, '']
          Z_MAX: [4.9, 2, '']
        VOXEL_SIZE:
          X: [0.2, 2, '']
          Y: [0.2, 2, '']
          Z: [8.0, 2, '']
        MAX_POINTS_PER_VOXEL: [20, 2, '']
        MAX_VOXEL_NUM: [60000, 2, '']
      AUGMENT:
        EXTRACT_MINOR_TYPE: [False, 2, '是否进行少数类别增强标志位']
        APPEND_TYPES: ['None', 2, '需要进行数据增强的具体类别']
        APPEND_NUM: ['None', 2, '单帧点云中每种类别需要添加的点云簇数目']
        APPEND_PROBS: ['None', 2, '单帧点云中每种类别进行数据增强的概率']
        FILTER_MIN_POINTS: [False, 2, '是否针对不同类别利用点数进行目标筛选']
        MIN_POINTS_NUM:
          PEDESTRIAN: [35, 2, '']
          MBIKE: [40, 2, '']
          CAR: [50, 2, '']
          BUS: [60, 2, '']
          TRICYCLE: [40, 2, '']
        RANDOM_FLIP: [True, 2, '随机沿X\Y方向翻转']
        RANDOM_ROTATION:
          MIN: [-0.3925, 2, '旋转角度(弧度制)下限']
          MAX: [0.3925, 2, '旋转角度(弧度制)上限']
        RANDOM_SCALINGS:
          MIN: [0.95, 2, '']
          MAX: [1.05, 2, '']
      LOSS:
        PRINT_GAP: [1, 2, '输出间隔,每经过多少个batch打印一次损失值']
        CLS_WEIGHT: [1.0, 2, '类别损失权重']
        LOC_WEIGHT: [0.25, 2, '定位损失权重']
        POS_CLS_WEIGHT: [1.0, 2, '正例样本类别损失']
        NEG_CLS_WEIGHT: [2.0, 2, '负例样本类别损失']
  VALIDATION:
    VALI_:
      PREFIX: ['validation', 0, '模型处于生成验证集阶段的标志参数,参见data_dataset.py中 类dataset的构造函数代码注释']

  TEST:
    TEST_:
      PREFIX: ['test', 0, '模型处于生成测试集阶段的标志参数,参见data_dataset.py中 类dataset的构造函数代码注释']
  PREDICT:
    PREDICT_:
      PREFIX: ['predict', 0, '模型处于生成感知预测集阶段的标志参数,参见data_dataset.py中 类dataset的构造函数代码注释']

  EVALUATION:
    START_EPOCH: [0, 2, '评估过程起始epoch']
    END_EPOCH: [1, 2, '评估过程结束epoch'] 

  SAVE:
    SAVE_EPOCH: [1, 2, '保存指定epoch的onnx模型']
    SAVE_PATH: ['model_onnx', 2, 'onnx模型或bin模型保存路径(文件夹名)']

  ANCHORS:
    ANCHOR_GENERATOR_CONFIG_PEDESTRIAN:
      class_name: [ 'Pedestrian', 1, '类别名' ]
      anchor_sizes:
        X: [0.73, 2, '' ]
        Y: [0.67, 2, '' ]
        Z: [1.67, 2, '' ]
      anchor_bottom_heights: [-1.085, 2, 'Pedestrian锚框底边高度' ]
      align_center: [False, 1, 'align_center' ]
      feature_map_stride: [ 4, 1, 'feature_map_stride' ]
      matched_threshold: [ 0.5, 1, 'Pedestrian匹配阈值']
      unmatched_threshold: [ 0.3, 1, 'Pedestrian未匹配阈值']
    ANCHOR_GENERATOR_CONFIG_MBIKE:
      class_name: [ 'Mbike', 1, '类别名' ]
      anchor_sizes:
        X: [1.80, 2, '' ]
        Y: [0.77, 2, '' ]
        Z: [1.47, 2, '' ]
      anchor_bottom_heights: [-1.085, 2, 'Mbike锚框底边高度' ]
      align_center: [ False, 1, 'align_center' ]
      feature_map_stride: [ 4, 1, 'feature_map_stride' ]
      matched_threshold: [ 0.5, 1, 'Mbike匹配阈值' ]
      unmatched_threshold: [ 0.3, 1, 'Mbike未匹配阈值' ]
    ANCHOR_GENERATOR_CONFIG_CAR:
      class_name: [ 'Car', 1, '类别名']
      anchor_sizes:
        X: [4.63, 2, '']
        Y: [1.97, 2, '']
        Z: [1.74, 2, '']
      anchor_bottom_heights: [-0.95, 2, 'Car锚框底边高度' ]
      align_center: [ False, 1, 'align_center' ]
      feature_map_stride: [ 4, 1, 'feature_map_stride' ]
      matched_threshold: [ 0.6, 1, 'Car匹配阈值' ]
      unmatched_threshold: [ 0.45, 1, 'Car未匹配阈值' ]
    ANCHOR_GENERATOR_CONFIG_BUS:
      class_name: [ Bus, 1, '类别名' ]
      anchor_sizes:
        X: [10.5, 2, '' ]
        Y: [2.94, 2, '' ]
        Z: [3.47, 2, '' ]
      anchor_bottom_heights: [-0.085, 2, 'Bus锚框底边高度' ]
      align_center: [ False, 1, 'align_center' ]
      feature_map_stride: [ 4, 1, 'feature_map_stride' ]
      matched_threshold: [ 0.55, 1, 'Car匹配阈值' ]
      unmatched_threshold: [ 0.4, 1, 'Bus未匹配阈值' ]
    ANCHOR_GENERATOR_CONFIG_TRICYCLE:
      class_name: [ 'Tricycle', 1, '类别名' ]
      anchor_sizes:
        X: [2.30, 2, '' ]
        Y: [1.63, 2, '' ]
        Z: [1.83, 2, '' ]
      anchor_bottom_heights: [-1.033, 2, 'Tricycle锚框底边高度' ]
      align_center: [ False, 1, 'align_center' ]
      feature_map_stride: [ 4, 1, 'feature_map_stride' ]
      matched_threshold: [ 0.55, 1, 'Tricycle匹配阈值' ]
      unmatched_threshold: [ 0.4, 1, 'Tricycle未匹配阈值' ]
  POSTPROCESS:
    NMS:
      MULTI_CLASSES_NMS: [True, 2, '']
      NMS_TYPE: ['nms_gpu', 2, '']
      NMS_THRESH: [0.2, 2, '']
      NMS_PRE_MAXSIZE: [4000, 2, '']
      NMS_POST_MAXSIZE: [166, 2, '']
    SCORE_THRESH: [0.2, 2, '']



# =============================================================================
# display
# =============================================================================
DISPLAY:
  RESULT_PATH: ['loss_eva', 2, '读取 模型损失文件losses.npy和测评文件eva_test.npy的路径(文件夹名)']
